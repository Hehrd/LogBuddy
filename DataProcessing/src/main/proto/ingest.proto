syntax = "proto3";

package ingest;

// Java codegen options
option java_multiple_files = true;
option java_package = "com.alexander.processing.ingest";
option java_outer_classname = "IngestProto";

// Spark → microservice ingestion API
service IngestService {
  // Client-side streaming RPC
  rpc ingest (stream IngestRequest) returns (IngestResponse);
}

// One record from Spark
message IngestRequest {
  string dsName = 1;
  repeated LogEntry logEntries = 2;
}

// Summary sent back when the stream completes
message IngestResponse {
  int64 received = 1;
}

message LogEntry {
  string plainText = 1;
  string traceId = 2;
  string spanId = 3;
  string timestamp = 5;
  map<string, string> fields = 6;
}