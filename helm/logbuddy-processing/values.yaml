nameOverride: ""
fullnameOverride: ""

config:
  enabled: true
  mountPath: /opt/logbuddy/config
  existingConfigMap: ""

dataProcessing:
  enabled: true
  replicaCount: 1
  image:
    repository: logbuddy/data-processing
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    appPort: 6969
    grpcPort: 9090
  env:
    APP_PORT: "6969"
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

sparkProcessing:
  enabled: true
  replicaCount: 1
  image:
    repository: logbuddy/spark-processing
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    appPort: 16000
  env:
    APP_PORT: "16000"
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

aiAnalyze:
  enabled: true
  replicaCount: 1
  image:
    repository: logbuddy/ai-analyze
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    appPort: 8000
  env:
    APP_PORT: "8000"
    OLLAMA_BASE_URL: "http://127.0.0.1:11434"
    OLLAMA_MODEL: "llama3.1"
    OLLAMA_TIMEOUT_SECONDS: "60"
  ollama:
    enabled: true
    model: llama3.1
    image:
      repository: ollama/ollama
      tag: latest
      pullPolicy: IfNotPresent
    port: 11434
    resources: {}
  resources: {}
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

testHadoop:
  enabled: false
  name: test-hadoop
  image:
    repository: logbuddy/test-hadoop
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    rpcPort: 9000
    dataPort: 9866
    httpPort: 9864
