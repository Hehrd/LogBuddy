{{- if .Values.aiAnalyze.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "logbuddy-processing.aiAnalyzeName" . }}
  labels:
    {{- include "logbuddy-processing.labels" . | nindent 4 }}
    {{- include "logbuddy-processing.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/name: ai-analyze
spec:
  replicas: {{ .Values.aiAnalyze.replicaCount }}
  selector:
    matchLabels:
      {{- include "logbuddy-processing.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/name: ai-analyze
  template:
    metadata:
      labels:
        {{- include "logbuddy-processing.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/name: ai-analyze
      {{- with .Values.aiAnalyze.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
        - name: ai-analyze
          image: "{{ .Values.aiAnalyze.image.repository }}:{{ .Values.aiAnalyze.image.tag }}"
          imagePullPolicy: {{ .Values.aiAnalyze.image.pullPolicy }}
          env:
            {{- range $key, $value := .Values.aiAnalyze.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.aiAnalyze.service.appPort }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- with .Values.aiAnalyze.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.aiAnalyze.ollama.enabled }}
        - name: ollama
          image: "{{ .Values.aiAnalyze.ollama.image.repository }}:{{ .Values.aiAnalyze.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.aiAnalyze.ollama.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
          args:
            - |
              ollama serve &
              server_pid=$!
              (
                until ollama pull "$OLLAMA_MODEL"; do
                  sleep 2
                done
              ) &
              wait "$server_pid"
          env:
            - name: OLLAMA_MODEL
              value: {{ .Values.aiAnalyze.ollama.model | quote }}
          ports:
            - name: ollama
              containerPort: {{ .Values.aiAnalyze.ollama.port }}
          readinessProbe:
            tcpSocket:
              port: ollama
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: ollama
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          {{- with .Values.aiAnalyze.ollama.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- if .Values.aiAnalyze.ollama.enabled }}
      volumes:
        - name: ollama-data
          emptyDir: {}
      {{- end }}
      {{- with .Values.aiAnalyze.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.aiAnalyze.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.aiAnalyze.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
