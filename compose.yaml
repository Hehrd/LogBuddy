services:
  data-processing:
    build:
      context: ./DataProcessing
      dockerfile: Dockerfile
    container_name: logbuddy-data-processing
    env_file:
      - .env
    environment:
      APP_PORT: ${DATA_PROCESSING_PORT}
    ports:
      - "${DATA_PROCESSING_PORT}:8080"
      - "${GRPC_PORT}:9090"
    volumes:
      - ./config:/opt/logbuddy/config:ro
    restart: unless-stopped
    networks:
      - logbuddy

  spark-processing:
    build:
      context: ./SparkProcessing
      dockerfile: Dockerfile
    container_name: logbuddy-spark-processing
    env_file:
      - .env
    environment:
      APP_PORT: ${SPARK_PORT}
    ports:
      - "${SPARK_PORT}:8081"
    volumes:
      - ./config:/opt/logbuddy/config:ro
    depends_on:
      - data-processing
    restart: unless-stopped
    networks:
      - logbuddy

networks:
  logbuddy:
    driver: bridge
