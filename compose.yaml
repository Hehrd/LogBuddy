services:
  control-panel:
    build:
      context: ./ControlPanel
      dockerfile: Dockerfile
    container_name: logbuddy-control-panel
    env_file:
      - .env
    ports:
      - "${CONTROL_PANEL_PORT:-8080}:8080"
    depends_on:
      - data-processing
      - spark-processing
    restart: unless-stopped
    networks:
      - logbuddy

  data-processing:
    build:
      context: ./DataProcessing
      dockerfile: Dockerfile
    container_name: logbuddy-data-processing
    env_file:
      - .env
    ports:
      - "${DATA_PROCESSING_PORT}:6969"
      - "${GRPC_PORT}:9090"
    volumes:
      - ./config:/opt/logbuddy/config:ro
    restart: unless-stopped
    networks:
      - logbuddy

  spark-processing:
    build:
      context: ./SparkProcessing
      dockerfile: Dockerfile
    container_name: logbuddy-spark-processing
    env_file:
      - .env
    ports:
      - "${SPARK_PORT}:16000"
    volumes:
      - ./config:/opt/logbuddy/config:ro
    depends_on:
      - data-processing
    restart: unless-stopped
    networks:
      - logbuddy

networks:
  logbuddy:
    driver: bridge
