services:
  data-processing:
    build:
      context: ./DataProcessing
      dockerfile: Dockerfile
    container_name: logbuddy-data-processing
    environment:
      APP_PORT: ${DATA_PROCESSING_PORT:-8080}
    ports:
      - "${DATA_PROCESSING_PORT:-8080}:8080"
      - "${GRPC_PORT:-9090}:9090"
    volumes:
      - ./config:/opt/logbuddy/config:ro
    restart: unless-stopped
    networks:
      - logbuddy

  spark-processing:
    build:
      context: ./SparkProcessing
      dockerfile: Dockerfile
    container_name: logbuddy-spark-processing
    environment:
      APP_PORT: ${SPARK_PORT:-8081}
    ports:
      - "${SPARK_PORT:-8081}:8081"
    volumes:
      - ./config:/opt/logbuddy/config:ro
    depends_on:
      - data-processing
    restart: unless-stopped
    networks:
      - logbuddy

networks:
  logbuddy:
    driver: bridge